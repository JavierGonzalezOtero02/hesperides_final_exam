  model:
    # Class-balanced L2 logistic regression. class_weight="balanced" removes the
    # majority-"up-week" prior so the model can short genuine downtrends, making the
    # long/short strategy regime-adaptive (positive in both the 2022 bear and 2023 bull).
    class: "code.modules.stages.models.balanced_logistic.BalancedLogisticModel"
    params:
      C: 1.0                     # sklearn default — not tuned against the test set
      max_iter: 2000
      class_weight: "balanced"
      solver: "lbfgs"
      random_state: 42

  metrics:
    class: "code.modules.stages.metrics.metrics_sharpe.MetricsSharpe"
    params:
      trading_days_per_year: 52  # weekly bars → 52 periods/year for Sharpe annualisation
      signal_mode: "classification"

  model_loader:
    class: "code.modules.stages.loaders.basic_model_loader.BasicModelLoader"
    params: {}
